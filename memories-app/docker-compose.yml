version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dingnan_memories
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql

  backend:
    build: ./backend
    environment:
      PORT: 4000
      JWT_SECRET: dev-secret
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dingnan_memories
      UPLOAD_DIR: uploads
    depends_on:
      - db
    ports:
      - '4000:4000'
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4000/api
      NEXT_PUBLIC_API_ORIGIN: http://localhost:4000
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  pgdata:
